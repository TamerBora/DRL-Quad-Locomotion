seed: 42
policy: "MlpPolicy"
policy_kwargs:
  activation_fn: 'nn.ELU'
  net_arch: [512, 256, 128]
  log_std_init: -1.0
n_steps: 32
n_minibatches: 4
n_epochs: 3
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 1.0
max_grad_norm: 1.0
target_kl: 0.01
learning_rate: 3.0e-4

n_timesteps: 50_000_000
checkpoint_interval: 5_000_000
